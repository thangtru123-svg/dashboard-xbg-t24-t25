<script>
// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const parseRow = l => {
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<l.length;i++){
      const c=l[i];
      if(c==='"') inQ=!inQ;
      else if(c===','&&!inQ){cols.push(cur);cur='';}
      else cur+=c;
    }
    cols.push(cur); return cols;
  };
  const hdrs = parseRow(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const v=parseRow(l), obj={};
    hdrs.forEach((h,i)=>obj[h]=v[i]||'');
    return obj;
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const pct  = v => parseFloat((v||'').replace('%',''))||0;
const num  = v => parseInt((v||'').replace(/,/g,''))||0;
const fV   = n => (n||0).toLocaleString('vi-VN');
const fP   = n => n.toFixed(2)+'%';
const fL   = n => n.toFixed(2);

function dPct(v25,v24,goodUp=true){
  const d=v25-v24;
  if(Math.abs(d)<0.001) return '<span class="neutral">–</span>';
  const cls=(d>0)===goodUp?'up2':'dn2';
  const sign=d>0?'▲':'▼';
  return `<span class="${cls}">${sign}${Math.abs(d).toFixed(2)}%</span>`;
}
function dNum(v25,v24,goodUp=false){
  const d=v25-v24;
  if(d===0) return '<span class="neutral">–</span>';
  const cls=(d>0)===goodUp?'up2':'dn2';
  const sign=d>0?'▲':'▼';
  return `<span class="${cls}">${sign}${Math.abs(d).toLocaleString()}</span>`;
}
function dPctRaw(v25,v24,goodUp=true){
  const d=v25-v24;
  if(Math.abs(d)<0.001) return '<span class="neutral">–</span>';
  const cls=(d>0)===goodUp?'up2':'dn2';
  const sign=d>0?'▲':'▼';
  return `<span class="${cls}">${sign}${Math.abs(d*100).toFixed(2)}%</span>`;
}

// ─── FETCH ───────────────────────────────────────────────────────────────────

// ─── TABLE 0: OVERVIEW ───────────────────────────────────────────────────────
function buildOverview(data, s4D, s6D, s8D){
  const byType={};
  data.forEach(r=>{
    const loai=r['Loại Hàng']||r['Chi tiết'];
    if(!byType[loai]) byType[loai]={};
    byType[loai][r['Time']]={
      vol:num(r['Volume']),
      gan:pct(r['% Gán']),
      gtc:pct(r['% GTC'])
    };
  });
  const types=['Hàng Mới Ca 1','Hàng Mới Ca 2','Hàng Tồn'];

  // Weighted avg for Volume/Gán/GTC
  const ov24=data.filter(r=>r['Time']==='2026/24');
  const ov25=data.filter(r=>r['Time']==='2026/25');
  const wAvg=(rows,field)=>{
    const tot=rows.reduce((s,r)=>s+num(r['Volume']),0);
    const w=rows.reduce((s,r)=>s+num(r['Volume'])*pct(r[field])/100,0);
    return tot>0?(w/tot*100):0;
  };
  const ag24={vol:ov24.reduce((s,r)=>s+num(r['Volume']),0),gan:wAvg(ov24,'% Gán'),gtc:wAvg(ov24,'% GTC')};
  const ag25={vol:ov25.reduce((s,r)=>s+num(r['Volume']),0),gan:wAvg(ov25,'% Gán'),gtc:wAvg(ov25,'% GTC')};

  // Tỉ lệ trả từ Sheet 4 (Return by AM) – trung bình đơn giản
  const rt24=s4D.filter(r=>r['Time']==='2026/24');
  const rt25=s4D.filter(r=>r['Time']==='2026/25');
  const avgRt=rows=>rows.length?rows.reduce((s,r)=>s+pct(r['% Return']),0)/rows.length:0;
  const tra24v=avgRt(rt24), tra25v=avgRt(rt25);

  // Ontime Giao TTS từ Sheet 6 (Ontime Giao AM) – trung bình trọng số theo GTC
  const og24=s6D.filter(r=>r['Time']==='2026/24');
  const og25=s6D.filter(r=>r['Time']==='2026/25');
  const wOG=rows=>{const tot=rows.reduce((s,r)=>s+num(r['Đơn GTC']),0);const w=rows.reduce((s,r)=>s+num(r['Đơn GTC'])*pct(r['%Ontime'])/100,0);return tot>0?w/tot*100:0;};
  const og24v=wOG(og24), og25v=wOG(og25);

  // Ontime Lấy TTS từ Sheet 8 (Ontime Lấy AM) – trung bình trọng số theo LTC
  const ol24=s8D.filter(r=>r['Time']==='2026/24');
  const ol25=s8D.filter(r=>r['Time']==='2026/25');
  const wOL=rows=>{const tot=rows.reduce((s,r)=>s+num(r['LTC']),0);const w=rows.reduce((s,r)=>s+num(r['LTC'])*pct(r['% OT'])/100,0);return tot>0?w/tot*100:0;};
  const ol24v=wOL(ol24), ol25v=wOL(ol25);

  let rows='';
  types.forEach(t=>{
    const v24=byType[t]?.['2026/24']||{};
    const v25=byType[t]?.['2026/25']||{};
    rows+=`<tr>
      <td class="left bold">${t}</td>
      <td>${fV(v24.vol||0)}</td><td>${fV(v25.vol||0)}</td><td>${dNum(v25.vol||0,v24.vol||0)}</td>
      <td>${fP(v24.gan||0)}</td><td>${fP(v25.gan||0)}</td><td>${dPct(v25.gan||0,v24.gan||0)}</td>
      <td>${fP(v24.gtc||0)}</td><td>${fP(v25.gtc||0)}</td><td>${dPct(v25.gtc||0,v24.gtc||0)}</td>
      <td class="neutral" colspan="3">–</td>
      <td class="neutral" colspan="3">–</td>
      <td class="neutral" colspan="3">–</td>
    </tr>`;
  });

  const grandRow=`<tr class="grand-total">
    <td class="left">GRAND TOTAL</td>
    <td>${fV(ag24.vol)}</td><td>${fV(ag25.vol)}</td><td>${dNum(ag25.vol,ag24.vol)}</td>
    <td>${fP(ag24.gan)}</td><td>${fP(ag25.gan)}</td><td>${dPct(ag25.gan,ag24.gan)}</td>
    <td>${fP(ag24.gtc)}</td><td>${fP(ag25.gtc)}</td><td>${dPct(ag25.gtc,ag24.gtc)}</td>
    <td>${fP(tra24v)}</td><td>${fP(tra25v)}</td><td>${dPct(tra25v,tra24v,false)}</td>
    <td>${fP(og24v)}</td><td>${fP(og25v)}</td><td>${dPct(og25v,og24v)}</td>
    <td>${fP(ol24v)}</td><td>${fP(ol25v)}</td><td>${dPct(ol25v,ol24v)}</td>
  </tr>`;

  const tbl=`<table>
    <thead><tr>
      <th rowspan="2" style="min-width:140px">Loại Hàng</th>
      <th colspan="3">Volume</th>
      <th colspan="3">% Gán</th>
      <th colspan="3">% GTC</th>
      <th colspan="3">% Tỉ lệ trả</th>
      <th colspan="3">Ontime Giao TTS</th>
      <th colspan="3">Ontime Lấy TTS</th>
    </tr><tr>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
    </tr></thead>
    <tbody>${rows}${grandRow}</tbody>
  </table>
  <div style="margin-top:8px;font-size:12px;color:#555">* % Tỉ lệ trả, Ontime Giao/Lấy TTS chỉ hiển thị ở dòng GRAND TOTAL (tổng hợp từ các bảng chi tiết bên dưới)</div>`;

  const analysis=`<div class="analysis">
    <b>📌 Nhận xét tổng quan:</b><br>
    • <b>Volume:</b> Tổng tuần 25 = <b>${fV(ag25.vol)}</b> đơn (${ag25.vol>=ag24.vol?'▲ tăng':'▼ giảm'} ${Math.abs(ag25.vol-ag24.vol).toLocaleString()} so T24 = ${fV(ag24.vol)}).<br>
    • <b>% Gán:</b> T24 = ${fP(ag24.gan)} → T25 = ${fP(ag25.gan)} (${dPct(ag25.gan,ag24.gan)}). Cần duy trì và đẩy tỉ lệ gán đặc biệt ở Ca 2 và Hàng Tồn.<br>
    • <b>% GTC:</b> T24 = ${fP(ag24.gtc)} → T25 = ${fP(ag25.gtc)} (${dPct(ag25.gtc,ag24.gtc)}). Hàng Tồn có GTC thấp nhất – cần ưu tiên xử lý.<br>
    • <b>% Tỉ lệ trả (TB):</b> T24 = ${fP(tra24v)} → T25 = ${fP(tra25v)} (${dPct(tra25v,tra24v,false)}) – xem chi tiết Bảng 6 & 7.<br>
    • <b>Ontime Giao TTS (TB):</b> T24 = ${fP(og24v)} → T25 = ${fP(og25v)} ${og25v>=96?'✅ đạt ngưỡng ≥96%':'⚠️ chưa đạt ngưỡng 96%'} – xem chi tiết Bảng 8 & 9.<br>
    • <b>Ontime Lấy TTS (TB):</b> T24 = ${fP(ol24v)} → T25 = ${fP(ol25v)} ${ol25v>=80?'✅ đạt ngưỡng ≥80%':'⚠️ chưa đạt ngưỡng 80%'} – xem chi tiết Bảng 10 & 11.
  </div>`;
  return tbl+analysis;
}

// ─── TABLE 1: GTC THEO AM ────────────────────────────────────────────────────
function buildGTCByAM(data){
  const map={};
  data.forEach(r=>{
    const am=r['Chi tiết'];
    if(!map[am]) map[am]={};
    const t=r['Time'];
    map[am][t]={vol:num(r['Volume']),gan:pct(r['% Gán']),gtc:pct(r['% GTC']),tra:pct(r['% Chuyển trả'])};
  });

  // Sort by GTC T25 ascending (lowest first)
  const ams=Object.keys(map).filter(a=>a&&a.trim()&&a!=='-'&&a!=='XBG'&&!a.toLowerCase().includes('grand total'));
  ams.sort((a,b)=>{
    const ga=(map[a]?.['2026/25']?.gtc||0), gb=(map[b]?.['2026/25']?.gtc||0);
    return ga-gb;
  });

  // Grand total
  const all24=data.filter(r=>r['Time']==='2026/24');
  const all25=data.filter(r=>r['Time']==='2026/25');
  const wAvg=(rows,f)=>{const tot=rows.reduce((s,r)=>s+num(r['Volume']),0);const w=rows.reduce((s,r)=>s+num(r['Volume'])*pct(r[f])/100,0);return tot>0?w/tot*100:0;};
  const gt24={vol:all24.reduce((s,r)=>s+num(r['Volume']),0),gtc:wAvg(all24,'% GTC'),gan:wAvg(all24,'% Gán'),tra:wAvg(all24,'% Chuyển trả')};
  const gt25={vol:all25.reduce((s,r)=>s+num(r['Volume']),0),gtc:wAvg(all25,'% GTC'),gan:wAvg(all25,'% Gán'),tra:wAvg(all25,'% Chuyển trả')};

  let rows='';
  ams.forEach((am,i)=>{
    const v24=map[am]?.['2026/24']||{vol:0,gtc:0,gan:0,tra:0};
    const v25=map[am]?.['2026/25']||{vol:0,gtc:0,gan:0,tra:0};
    rows+=`<tr>
      <td>${i+1}</td>
      <td class="left bold">${am}</td>
      <td>${fV(v24.vol)}</td><td>${fV(v25.vol)}</td><td>${dNum(v25.vol,v24.vol)}</td>
      <td>${fP(v24.gan)}</td><td>${fP(v25.gan)}</td><td>${dPct(v25.gan,v24.gan)}</td>
      <td>${fP(v24.gtc)}</td><td>${fP(v25.gtc)}</td><td>${dPct(v25.gtc,v24.gtc)}</td>
    </tr>`;
  });

  const grand=`<tr class="grand-total">
    <td></td><td class="left">GRAND TOTAL</td>
    <td>${fV(gt24.vol)}</td><td>${fV(gt25.vol)}</td><td>${dNum(gt25.vol,gt24.vol)}</td>
    <td>${fP(gt24.gan)}</td><td>${fP(gt25.gan)}</td><td>${dPct(gt25.gan,gt24.gan)}</td>
    <td>${fP(gt24.gtc)}</td><td>${fP(gt25.gtc)}</td><td>${dPct(gt25.gtc,gt24.gtc)}</td>
  </tr>`;

  // Find worst and best
  const sorted=[...ams];
  const worst=sorted[0], best=sorted[sorted.length-1];
  const worstGtc25=map[worst]?.['2026/25']?.gtc||0;
  const bestGtc25=map[best]?.['2026/25']?.gtc||0;
  const declined=ams.filter(a=>(map[a]?.['2026/25']?.gtc||0)<(map[a]?.['2026/24']?.gtc||0));

  const analysis=`<div class="analysis">
    <b>📌 Nhận xét GTC theo AM:</b><br>
    • AM có tỉ lệ GTC thấp nhất tuần 25: <b>${worst}</b> (${fP(worstGtc25)}) – cần ưu tiên hỗ trợ và theo dõi sát.<br>
    • AM có tỉ lệ GTC cao nhất tuần 25: <b>${best}</b> (${fP(bestGtc25)}).<br>
    • Có <b>${declined.length}/${ams.length} AM</b> bị giảm tỉ lệ GTC so với tuần 24, cần rà soát nguyên nhân (thiếu nhân lực, vùng khó, chất lượng đơn...).<br>
    • Tổng Volume toàn vùng tuần 25 giảm so tuần 24 nhưng tỉ lệ GTC tổng thể có tín hiệu cải thiện nhẹ.
  </div>`;

  return `<table>
    <thead><tr>
      <th>STT</th><th style="min-width:180px">AM</th>
      <th colspan="3">Volume</th><th colspan="3">% Gán</th>
      <th colspan="3">% GTC</th>
    </tr><tr>
      <th></th><th></th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
      <th>T24</th><th>T25</th><th>±</th>
    </tr></thead>
    <tbody>${rows}${grand}</tbody>
  </table>`+analysis;
}

// ─── TABLE 2: GTC THEO BƯU CỤC ──────────────────────────────────────────────
function buildGTCByBC(data){
  const map={};
  data.forEach(r=>{
    const bc=r['Chi tiết'];
    if(!map[bc]) map[bc]={am:r['Cấp Quản Lý']||''};
    const t=r['Time'];
    map[bc][t]={vol:num(r['Volume']),gan:pct(r['% Gán']),gtc:pct(r['% GTC']),tra:pct(r['% Chuyển trả'])};
  });
  const bcs=Object.keys(map).filter(b=>b&&b.trim()&&!b.toLowerCase().includes('grand total'));
  bcs.sort((a,b)=>(map[a]?.['2026/25']?.gtc||0)-(map[b]?.['2026/25']?.gtc||0));

  const all24=data.filter(r=>r['Time']==='2026/24');
  const all25=data.filter(r=>r['Time']==='2026/25');
  const wAvg=(rows,f)=>{const tot=rows.reduce((s,r)=>s+num(r['Volume']),0);const w=rows.reduce((s,r)=>s+num(r['Volume'])*pct(r[f])/100,0);return tot>0?w/tot*100:0;};
  const gt24={vol:all24.reduce((s,r)=>s+num(r['Volume']),0),gtc:wAvg(all24,'% GTC'),gan:wAvg(all24,'% Gán'),tra:wAvg(all24,'% Chuyển trả')};
  const gt25={vol:all25.reduce((s,r)=>s+num(r['Volume']),0),gtc:wAvg(all25,'% GTC'),gan:wAvg(all25,'% Gán'),tra:wAvg(all25,'% Chuyển trả')};

  let rows='';
  bcs.forEach((bc,i)=>{
    const v24=map[bc]?.['2026/24']||{vol:0,gtc:0,gan:0,tra:0};
    const v25=map[bc]?.['2026/25']||{vol:0,gtc:0,gan:0,tra:0};
    rows+=`<tr>
      <td>${i+1}</td>
      <td class="left bold">${bc}</td>
      <td class="left">${map[bc].am}</td>
      <td>${fV(v24.vol)}</td><td>${fV(v25.vol)}</td><td>${dNum(v25.vol,v24.vol)}</td>
      <td>${fP(v24.gan)}</td><td>${fP(v25.gan)}</td><td>${dPct(v25.gan,v24.gan)}</td>
      <td>${fP(v24.gtc)}</td><td>${fP(v25.gtc)}</td><td>${dPct(v25.gtc,v24.gtc)}</td>
    </tr>`;
  });

  const grand=`<tr class="grand-total">
    <td></td><td class="left">GRAND TOTAL</td><td></td>
    <td>${fV(gt24.vol)}</td><td>${fV(gt25.vol)}</td><td>${dNum(gt25.vol,gt24.vol)}</td>
    <td>${fP(gt24.gan)}</td><td>${fP(gt25.gan)}</td><td>${dPct(gt25.gan,gt24.gan)}</td>
    <td>${fP(gt24.gtc)}</td><td>${fP(gt25.gtc)}</td><td>${dPct(gt25.gtc,gt24.gtc)}</td>
  </tr>`;

  const declined=bcs.filter(b=>(map[b]?.['2026/25']?.gtc||0)<(map[b]?.['2026/24']?.gtc||0));
  const worst5=bcs.slice(0,5).map(b=>`${b} (${fP(map[b]?.['2026/25']?.gtc||0)})`).join(', ');

  const analysis=`<div class="analysis">

function buildAgingTable(title, agingArr, dates, scrollable=false){

  const dayIdx6=5, dayIdx7=6;

  let totalByDate=new Array(7).fill(0);

  agingArr.forEach((item,i)=>{

    rows+=`<tr>

    </tr>`;

  rows+=`<tr class="grand-total">

  const tblHtml=`<table>

    .sort((a,b)=>(map[b]?.['2026/25']?.ltc||0)-(map[a]?.['2026/25']?.ltc||0))
    .slice(0,20);

  let sub20rows='';
  top20under80.forEach((bc,i)=>{
    const v24=map[bc]?.['2026/24']||{ltc:0,ot:0};
    const v25=map[bc]?.['2026/25']||{ltc:0,ot:0};
    sub20rows+=`<tr class="red-row">
      <td>${i+1}</td>
      <td class="left bold">${bc}</td>
      <td class="left">${map[bc].am}</td>
      <td>${fV(v24.ltc)}</td><td>${fV(v25.ltc)}</td>
      <td class="red-cell">${fP(v24.ot)}</td>
      <td class="red-cell">${fP(v25.ot)}</td>
      <td>${dPct(v25.ot,v24.ot)}</td>
    </tr>`;
  });

  const redBCs=bcs.filter(b=>(map[b]?.['2026/25']?.ot||0)<THRESH);
  const analysis=`<div class="analysis">
    <b>📌 Nhận xét Ontime Lấy TTS theo Bưu Cục:</b><br>
    • <b>${redBCs.length}/${bcs.length} Bưu Cục</b> có Ontime lấy &lt; 80% tuần 25 – tỉ lệ đáng lo ngại.<br>
    • Ontime lấy TB toàn vùng: T24 = ${fP(gtOT24)}, T25 = ${fP(gtOT25)}.<br>
    • Bảng Top 20 dưới đây thể hiện các Bưu Cục có Volume LTC lớn nhất nhưng Ontime &lt; 80% – đây là nhóm ưu tiên can thiệp vì ảnh hưởng nhiều nhất đến KPI vùng.
  </div>`;

  const mainTable=`<div class="scroll-box">
    <table>
      <thead><tr>
        <th>STT</th><th style="min-width:180px">Bưu Cục</th><th>AM</th>
        <th colspan="3">Đơn LTC</th><th colspan="3">% Ontime Lấy</th>
      </tr><tr>
        <th></th><th></th><th></th>
        <th>T24</th><th>T25</th><th>±</th>
        <th>T24</th><th>T25</th><th>±</th>
      </tr></thead>
      <tbody>${rows}${grand}</tbody>
    </table>
  </div>
  <div style="margin-top:8px;font-size:12px;color:#e53e3e;font-weight:600">🔴 Các hàng tô đỏ = Ontime lấy &lt; 80%</div>`;

  const sub20Table=`<div class="sub-title">🚨 Top 20 Bưu Cục có Volume LTC lớn nhất nhưng Ontime Lấy &lt; 80%</div>
  <table>
    <thead><tr>
      <th>STT</th><th style="min-width:180px">Bưu Cục</th><th>AM</th>
      <th>LTC T24</th><th>LTC T25</th>
      <th>% OT T24</th><th>% OT T25</th><th>±</th>
    </tr></thead>
    <tbody>${sub20rows}</tbody>
  </table>`;

  return mainTable+analysis+sub20Table;
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
async function main(){
  try{
    const app=document.getElementById('app');
    app.innerHTML='<div class="loading">⏳ Đang tải dữ liệu (10 sheet)...</div>';

    const [ov,s1,s2,s3raw,s4,s5,s6,s7,s8,s9]=await Promise.all([
      fGid(SID1,'228718427'),
      f(SID2,'Sheet 1'),
      f(SID2,'Sheet 2'),
      f(SID2,'Sheet 3'),
      f(SID2,'Sheet 4'),
      f(SID2,'Sheet 5'),
      f(SID2,'Sheet 6'),
      f(SID2,'Sheet 7'),
      f(SID2,'Sheet 8'),
      f(SID2,'Sheet 9'),
    ]);

    // Parse
    const ovD=parseCSV(ov);
    const s1D=parseCSV(s1), s2D=parseCSV(s2);
    const s4D=parseCSV(s4), s5D=parseCSV(s5);
    const s6D=parseCSV(s6), s7D=parseCSV(s7);
    const s8D=parseCSV(s8), s9D=parseCSV(s9);

    // Process aging (Sheet 3)
    const lines3=s3raw.trim().split('\n');
    const parseRow3=l=>{const cols=[];let cur='',inQ=false;for(let i=0;i<l.length;i++){const c=l[i];if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cols.push(cur);cur='';}else cur+=c;}cols.push(cur);return cols;};
    const DATES=['2026-06-15','2026-06-16','2026-06-17','2026-06-18','2026-06-19','2026-06-20','2026-06-21'];
    const amAgMap={}, bcBatOnMap={}, bcNormMap={};
    for(let i=1;i<lines3.length;i++){
      const r=parseRow3(lines3[i]);
      if(!r||r.length<13) continue;
      const am=r[10], bc=r[2], date=r[11], note=r[12];
      if(!am||!date) continue;
      if(!amAgMap[am]) amAgMap[am]={};
      amAgMap[am][date]=(amAgMap[am][date]||0)+1;
      if(note==='Bưu Cục bất ổn'){
        if(!bcBatOnMap[bc]) bcBatOnMap[bc]={};
        bcBatOnMap[bc][date]=(bcBatOnMap[bc][date]||0)+1;
      } else {
        if(!bcNormMap[bc]) bcNormMap[bc]={};
        bcNormMap[bc][date]=(bcNormMap[bc][date]||0)+1;
      }
    }
    const toArr=m=>Object.entries(m).map(([name,bd])=>{
      const vals=DATES.map(d=>bd[d]||0);
      return {name,vals,total:vals.reduce((a,b)=>a+b,0)};
    }).sort((a,b)=>b.total-a.total);

    const amAging=toArr(amAgMap), bcBatOn=toArr(bcBatOnMap), bcNorm=toArr(bcNormMap);

    // ─── BUILD HTML ─────────────────────────────────────────────────────────
    app.innerHTML=`
      ${sec('s0','📋','BẢNG TỔNG QUAN VÙNG XBG – SO SÁNH TUẦN 24 & 25','Số liệu tổng hợp toàn vùng theo Loại Hàng: Hàng Mới Ca 1, Ca 2, Hàng Tồn',buildOverview(ovD,s4D,s6D,s8D))}

      ${sec('s1','📊','BẢNG 1 – GTC THEO AM','So sánh Volume và Tỉ lệ GTC giữa Tuần 24 và 25 theo từng AM | Sắp xếp theo % GTC từ thấp đến cao',buildGTCByAM(s1D))}

      ${sec('s2','📊','BẢNG 2 – GTC THEO BƯU CỤC','So sánh Volume và Tỉ lệ GTC giữa Tuần 24 và 25 theo Bưu Cục | Sắp xếp theo % GTC từ thấp đến cao | Cuộn để xem thêm',buildGTCByBC(s2D))}

      <div class="section" id="s345">
        <div class="sec-title">⏰ BẢNG 3, 4, 5 – ĐƠN AGING &gt; 5 NGÀY (7 NGÀY LIÊN TIẾP: 15/06 – 21/06/2026)</div>
        <div class="sec-desc">Sắp xếp theo Volume Aging từ cao xuống thấp | Cột "± (20↔21)" = so sánh 2 ngày gần nhất</div>
        ${buildAgingTable('📌 BẢNG 3 – ĐƠN AGING > 5 NGÀY THEO AM',amAging,DATES)}
        ${buildAgingTable('🚨 BẢNG 4 – ĐƠN AGING > 5 NGÀY – BƯU CỤC BẤT ỔN',bcBatOn,DATES)}
        ${buildAgingTable('📦 BẢNG 5 – ĐƠN AGING > 5 NGÀY – BƯU CỤC THÔNG THƯỜNG',bcNorm,DATES,true)}
        <div class="analysis">
          <b>📌 Nhận xét Đơn Aging > 5 ngày:</b><br>
          • Tổng số đơn Aging > 5 ngày trong 7 ngày quan sát: <b>${(amAging.reduce((s,a)=>s+a.total,0)).toLocaleString()}</b> lượt đơn (một đơn có thể xuất hiện nhiều ngày).<br>
          • Có <b>${bcBatOn.length} Bưu Cục bất ổn</b> với đơn tồn kéo dài – cần giám sát đặc biệt và có phương án hỗ trợ cụ thể (tăng chuyến, điều phối nhân lực, kiểm tra vùng giao).<br>
          • So sánh ngày 20/06 và 21/06: Nếu số đơn tăng ▲ = tình trạng xấu đi, cần báo cáo khẩn và xử lý ngay.
        </div>
      </div>

      ${sec('s6','↩️','BẢNG 6 – TỈ LỆ TRẢ THEO AM','So sánh tỉ lệ chuyển trả Tuần 24 và 25 theo AM | Sắp xếp từ cao xuống thấp',buildReturnAM(s4D))}

      ${sec('s7','↩️','BẢNG 7 – TỈ LỆ TRẢ THEO BƯU CỤC','So sánh tỉ lệ chuyển trả Tuần 24 và 25 theo Bưu Cục | Sắp xếp từ cao xuống thấp | Cuộn để xem thêm',buildReturnBC(s5D))}

      ${sec('s8','🚚','BẢNG 8 – ONTIME GIAO TTS THEO AM','So sánh Đơn GTC và % Ontime Giao Tuần 24 & 25 | Sắp xếp % Ontime từ thấp đến cao | 🔴 Ontime &lt; 96%',buildOntimeGiaoAM(s6D))}

      ${sec('s9','🚚','BẢNG 9 – ONTIME GIAO TTS THEO BƯU CỤC','So sánh Đơn GTC và % Ontime Giao Tuần 24 & 25 | Sắp xếp % Ontime từ thấp đến cao | 🔴 Ontime &lt; 96% | Cuộn để xem thêm',buildOntimeGiaoBC(s7D))}

      ${sec('s10','📦','BẢNG 10 – ONTIME LẤY TTS THEO AM','So sánh Đơn LTC, % Ontime Lấy và Đơn lấy đúng OT Tuần 24 & 25 | Sắp xếp % Ontime từ thấp đến cao | 🔴 Ontime &lt; 80%',buildOntimeLayAM(s8D))}

      ${sec('s11','📦','BẢNG 11 – ONTIME LẤY TTS THEO BƯU CỤC','So sánh Đơn LTC và % Ontime Lấy Tuần 24 & 25 | Sắp xếp % Ontime từ thấp đến cao | 🔴 Ontime &lt; 80% | Top 20 BC Volume lớn nhưng OT thấp',buildOntimeLayBC(s9D))}

      <div style="text-align:center;padding:24px;color:#888;font-size:12px">
        Dashboard tự động tải dữ liệu từ Google Sheets | Vùng XBG | Cập nhật: 22/06/2026
      </div>
    `;
  } catch(e){
    document.getElementById('app').innerHTML=`<div class="loading" style="color:red">❌ Lỗi tải dữ liệu: ${e.message}</div>`;
    console.error(e);
  }
}
main();
</script>
